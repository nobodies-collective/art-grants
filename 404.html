<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Art Grants</title>
    <script>
      // GitHub Pages SPA redirect
      // When someone visits /proposal/my-slug directly, GH Pages serves this 404 page.
      // We store the path and redirect to index.html, which picks it up and opens the modal.
      var path = window.location.pathname;
      var search = window.location.search;
      sessionStorage.setItem('spa-redirect', path + search);
      window.location.replace(
        window.location.origin +
          path.replace(/\/proposal\/[^/]+\/?$/, '') +
          '/'
      );
    </script>
  </head>
  <body></body>
</html>
