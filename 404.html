<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Art Grants</title>
    <script>
      // GitHub Pages SPA redirect
      // When someone visits /2026/my-slug directly, GH Pages serves this 404 page.
      // We store the path and redirect to index.html, which picks it up.
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('spa-redirect', path + search + hash);
      var base = path.replace(/\/\d{4}\/[^/]+\/?$/, '');
      // If the path didn't match the expected /year/slug pattern, redirect to root
      // to avoid an infinite loop (e.g. links missing the year prefix)
      if (base === path || base === path.replace(/\/?$/, '')) {
        base = '/';
      }
      window.location.replace(window.location.origin + base);
    </script>
  </head>
  <body></body>
</html>
