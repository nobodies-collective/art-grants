<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Art Grants</title>
    <script>
      // GitHub Pages SPA redirect
      // When someone visits /2026/my-slug directly, GH Pages serves this 404 page.
      // We store the path and redirect to index.html, which picks it up.
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('spa-redirect', path + search + hash);
      window.location.replace(
        window.location.origin +
          path.replace(/\/\d{4}\/[^/]+\/?$/, '') +
          '/'
      );
    </script>
  </head>
  <body></body>
</html>
