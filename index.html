<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Art Grants</title>
    <meta name="description" content="Browse and submit art grant proposals. A platform for artists to share project ideas and track funding status." />
    <meta property="og:title" content="Art Grants" />
    <meta property="og:description" content="Browse and submit art grant proposals." />
    <meta property="og:type" content="website" />
    <script>
      // Set base href so relative asset paths work on deep SPA routes
      var base = document.createElement('base');
      base.href = window.location.pathname.replace(/\/\d{4}\/[^/]+\/?$/, '/');
      document.head.appendChild(base);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="css/main.css?v=3" />
  </head>
  <body class="is-loading">
    <div class="preloader" id="preloader">
      <div class="preloader-spinner"></div>
    </div>
    <div class="page-wrap">
      <header class="hero-header">
        <p class="hero-tagline">Elsewhere Burn 2026</p>
        <h1 class="hero-title">Art Grants</h1>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <section class="intro">
            <p>
              This platform displays art grant proposals. Proposals are submitted through a form and added to a spreadsheet,
              which populates this site. Browse proposals or
              <a
                href="https://forms.gle/9YQCsPKXtxTUjZ9a6"
                target="_blank"
                rel="noopener noreferrer"
                class="inline-link"
                >submit your own</a
              >. Read more about the event at
              <a
                href="https://nobodies.team/"
                target="_blank"
                rel="noopener noreferrer"
                class="inline-link"
                >nobodies.team</a
              >.
            </p>
            <p class="intro-count"><span id="proposal-count">0/0</span> proposals listed.</p>
          </section>
          <section
            class="controls"
            aria-label="Filters, sort and search">
            <div
              class="year-filters"
              role="group"
              aria-label="Filter by year"
              id="year-filters-container">
            </div>
            <div class="sort-search-row">
              <div class="sort-control">
                <label for="sort-select">Sort</label>
                <select id="sort-select">
                  <option value="">Newest first</option>
                  <option value="oldest">Oldest first</option>
                  <option value="title-asc">Title A → Z</option>
                  <option value="title-desc">Title Z → A</option>
                  <option value="year-asc">Year ↑</option>
                  <option value="year-desc">Year ↓</option>
                  <option value="category">Category</option>
                </select>
              </div>
              <div class="search-control">
                <label for="search-input">Search</label>
                <input
                  type="text"
                  id="search-input"
                  placeholder="Search..."
                  aria-label="Search proposals" />
              </div>
            </div>
          </section>
        </aside>

        <main class="content" aria-label="Proposals">
          <div
            id="loading"
            class="loading"
            role="status"
            aria-live="polite">
            <div class="spinner" aria-hidden="true"></div>
            <p>Loading proposals...</p>
          </div>
          <div
            id="error"
            class="error"
            role="alert"
            style="display: none"></div>
          <div id="proposals-list"></div>
        </main>
      </div>
    </div>
    <script>
      // Pick up SPA redirect from 404.html (GitHub Pages)
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script
      type="module"
      src="js/main.js"></script>
  </body>
</html>
